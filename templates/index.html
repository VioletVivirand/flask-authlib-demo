<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flask OAuth POC</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           display: flex; flex-direction: column; align-items: center;
           justify-content: center; height: 100vh; margin: 0; }
    a.button { display: inline-block; padding: 0.6em 1.4em; margin-top: 1em;
               background: #24292f; color: #fff; text-decoration: none;
               border-radius: 6px; font-weight: 600; }
    a.button:hover { background: #1b1f24; }
  </style>
</head>
<body>
  {% if user %}
    <h1>Welcome, {{ user.name }}!</h1>
    <a class="button" href="{{ url_for('logout') }}">Logout</a>
  {% else %}
    <h1>Flask OAuth POC</h1>
    <a class="button" href="{{ url_for('login') }}">Login with GitHub</a>
  {% endif %}
</body>
</html>
